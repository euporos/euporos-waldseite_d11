                          - iframe [ref=e1054]:
                            - generic "Rich Text Area. Press ALT-0 for help." [active] [ref=f4e1]:
                              - heading "Violina Petrychenko" [level=2] [ref=f4e2]:
                                - strong [ref=f4e3]: Violina Petrychenko
                              - paragraph [ref=f4e4]: Konzertpianistin | Künstlerische Leiterin | Botschafterin der ukrainischen Musik
                              - paragraph [ref=f4e5]
                              - paragraph [ref=f4e6]: Violina Petrychenko ist eine leidenschaftliche Pianistin, deren künstlerisches Schaffen der Bewahrung und weltweiten Verbreitung ukrainischer Musik gewidmet ist. Ihre international anerkannte Karriere führte sie von den Konservatorien in Kyjiw und Weimar zu bedeutenden europäischen Bühnen – darunter die Berliner Philharmonie sowie die Philharmonien von Luxemburg, Freiburg, Karlsruhe, Warschau, Kattowitz und Stettin.
                              - paragraph [ref=f4e7]: In der Ukraine trat sie in nahezu allen großen Konzerthäusern auf, darunter die Philharmonien von Kyjiw, Lwiw, Iwano-Frankiwsk, Chmelnyzkyj, Odessa, Dnipro, Czerniwzi und Saporischschja.
                              - paragraph [ref=f4e8]: Geboren in Saporischschja in eine Musikerfamilie, begann sie bereits im Alter von sechs Jahren mit dem Klavierspiel. Ihre musikalische Ausbildung erhielt sie an der Nationalen Musikakademie der Ukraine in Kyjiw sowie an den deutschen Hochschulen in Weimar, Köln und Essen, wo sie von Professoren wie Jacob Leuschner und Evgeny Sinaiski geprägt wurde. Meisterkurse bei namhaften Künstlern wie Pierre-Laurent Aimard, Ferenc Rados und Peter Nagy rundeten ihre Ausbildung ab.
                              - paragraph [ref=f4e9]
                              - paragraph [ref=f4e10]: Ihre musikalische Exzellenz wurde mit zahlreichen Preisen und Stipendien ausgezeichnet, darunter das Präsidentenstipendium der Ukraine, der DAAD-Preis, Förderungen der Werner Richard – Dr. Carl Dörken Stiftung, der Neuen Liszt Stiftung Weimar, der Anna Ruths Stiftung sowie der Gesellschaft der Freunde und Förderer der Hochschule für Musik „Franz Liszt“ Weimar.
                              - paragraph [ref=f4e11]
                              - paragraph [ref=f4e12]: Als Solistin und Kammermusikerin ist Violina international tätig. Sie trat mehrfach im Rundfunk auf – u. a. bei WDR, MDR, SWR, dem Bayerischen Rundfunk sowie im ZDF, und ihre Musik wurde dort regelmäßig übertragen. Ihre Festivalauftritte führten sie in zahlreiche Länder Europas, darunter nach Stockholm (Festival Ukrainischer Frühling), Kopenhagen (Copenhagen Summer Festival), Palermo (Palermo Classica), Kwidzyn (Kwidzyn Music Spring International Festival), Bayreuth (Bayreuth Piano Festival) sowie zu den renommierten Festivals Virtuosen von Lemberg und Kontraste Lemberg in der Ukraine.
                              - paragraph [ref=f4e13]: Einen zentralen Schwerpunkt ihrer Arbeit bildet das ukrainische Repertoire – Musik, die sie mit Hingabe, Forschung und künstlerischer Leidenschaft wiederentdeckt und in die Gegenwart führt.
                              - paragraph [ref=f4e14]: Ein zentrales Feld ihres Schaffens ist die Kammermusik. Violina wirkt in mehreren Ensembles – vom Duo bis zum Sextett – und verbindet in ihren Programmen klassisches Repertoire mit selten gespielten ukrainischen Werken. Mit ihrem Quintett „Las Damas“ widmet sie sich zudem den leidenschaftlichen Klängen von Astor Piazzolla und der Musik des 20. Jahrhunderts.
                              - paragraph [ref=f4e15]: "Bis heute hat Violina acht CDs aufgenommen, darunter Slavic Nobility, Ukrainian Moods, Barvinsky: Silent Voice, Mriyi (Dreams) – Ukrainian Hope (nominiert für den Opus Klassik), Winter Whispers, Passion for Ukraine (mit Lena Belkina) sowie die 2025 erscheinenden Alben Piano Concertos by Barvinsky and Kosenko und Piano Quintets by Barvinsky and Lyatoshynsky mit dem Phoenix String Quartet."
                              - paragraph [ref=f4e16]: Neben ihrer Konzerttätigkeit engagiert sich Violina als künstlerische Leiterin und Gründerin des Festivals „Sounds of Ukraine“ in Köln, das sie 2023 ins Leben rief. Dieses Festival widmet sich der Vielfalt ukrainischer Musik und bringt sie in einem internationalen Dialog auf die Bühnen Europas.
                              - paragraph [ref=f4e17]: Seit 2025 leitet sie in Lwiw die neue Konzertreihe „Barvinsky Salon“, die der Wiederentdeckung und Popularisierung der Musik von Vasyl Barvinsky gewidmet ist.
                              - paragraph [ref=f4e18]: "Seit Beginn des Krieges hat Violina Petrychenko ihre Bemühungen noch einmal verstärkt. Ihr Ziel ist es, die Vielfalt der ukrainischen Musik zu zeigen und ihr das Recht zu geben, gespielt und gehört zu werden. Wie der Musikkritiker Michael Zerban (O-Ton) schrieb: „Sie tritt nicht nur für sich, sondern für ihr Land auf – hier geht es um Gesellschaft und Freiheit.“"
                              - paragraph [ref=f4e19]: In jedem ihrer Konzerte erklingt seither mindestens ein Werk eines ukrainischen Komponisten – als Zeichen des Widerstands, der Erinnerung und der kulturellen Selbstbehauptung.
                              - paragraph [ref=f4e20]: Derzeit ist Violina Petrychenko Solistin der Lemberger Philharmonie und weltweit als Konzertpianistin unterwegs.
