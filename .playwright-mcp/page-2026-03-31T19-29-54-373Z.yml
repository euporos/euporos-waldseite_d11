                      - textbox [ref=e980]: Die Pianistin Violina Petrychenko sieht ihre Mission darin, ukrainische Musik und Kultur bekannter zu machen. In ihrer Heimatstadt Saporischja begann sie ihre Ausbildung in Musikwissenschaft und als Pianistin. Ihr Studium führte sie nach Kiew, Weimar, Köln und Essen. Gegenwärtig arbeitet und unterrichtet sie in Köln. Acht CD-Einspielungen widmete sie ukrainischen Komponisten des 20. Jahrhunderts. Zusammen mit ihren Ensembles, bringt die ukrainische Pianistin Violina Petrychenko die klassische Musik der Ukraine in die Konzerthäuser Europas.
