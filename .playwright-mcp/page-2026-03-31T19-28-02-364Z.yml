                          - iframe [ref=e332]:
                            - generic "Rich Text Area. Press ALT-0 for help." [active] [ref=f2e1]:
                              - paragraph [ref=f2e2]: Das Abschlusskonzert des Festivals Sounds of Ukraine ist der Kammermusik sowie dem Schaffen von Vasyl Barvinsky und Antonín Dvořák gewidmet. Der Abend fasst die Idee des Festivals zusammen und eröffnet einen Dialog zwischen ukrainischer und europäischer Musiktradition.
                              - paragraph [ref=f2e3]
                              - paragraph [ref=f2e4]: Antonín Dvořák zählt zu den bedeutendsten tschechischen Komponisten des 19. Jahrhunderts. Seine Musik verbindet klassische Formen mit einer tiefen Verwurzelung in der Volksmusik. Besonders in der Kammermusik entwickelte er eine Ausdruckssprache von großer emotionaler Kraft und struktureller Klarheit.
                              - paragraph [ref=f2e5]
                              - paragraph [ref=f2e6]: Vasyl Barvinsky gehört zu den wichtigsten Komponisten Galiziens und ist eine zentrale Figur der ukrainischen Musik des frühen 20. Jahrhunderts. Er studierte in Prag und wurde stark von der dortigen Komponistenschule geprägt. Aufgrund politischer Verfolgung verschwand seine Musik über Jahrzehnte aus dem Konzertleben, viele seiner Werke wurden zerstört. Erst heute kehrt Barvinskys Musik allmählich auf die Konzertbühnen zurück.
                              - paragraph [ref=f2e7]
                              - paragraph [ref=f2e8]: "Das Programm umfasst zwei Klaviertrios: das a-Moll-Trio von Barvinsky und das f-Moll-Trio op. 65 von Dvořák. Beide Werke zeigen die Kammermusik als einen Raum intensiven musikalischen Dialogs, in dem nationale Identität und europäische Form in enger Verbindung stehen."
